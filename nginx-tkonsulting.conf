# /etc/nginx/sites-available/tkonsulting.fr
# Copier ce fichier sur le VPS IONOS puis :
#   ln -s /etc/nginx/sites-available/tkonsulting.fr /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name tkonsulting.fr www.tkonsulting.fr;

    # Redirect to HTTPS (Cloudflare gère le SSL si le domaine est proxied)
    # Sinon, utiliser certbot : certbot --nginx -d tkonsulting.fr -d www.tkonsulting.fr
    return 301 https://tkonsulting.fr$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tkonsulting.fr;

    root /var/www/tkonsulting;
    index index.html;

    # SSL — à remplacer par Certbot ou Cloudflare Origin Cert
    # ssl_certificate     /etc/letsencrypt/live/tkonsulting.fr/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tkonsulting.fr/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Cache assets statiques (CSS, JS, images)
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML — pas de cache pour les pages
    location / {
        try_files $uri $uri/ $uri.html /index.html;
        add_header Cache-Control "no-cache";
    }

    # Redirect www → non-www
    server_name www.tkonsulting.fr;
    return 301 https://tkonsulting.fr$request_uri;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
